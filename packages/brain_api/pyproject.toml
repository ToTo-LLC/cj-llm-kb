[project]
name = "brain_api"
version = "0.1.0"
description = "brain REST + WebSocket backend — FastAPI wrapper around brain_core"
requires-python = ">=3.12"
dependencies = [
    "brain_core",
    # "brain_mcp",  # REMOVED — Plan 05 Task 14 moved RateLimiter to brain_core.
    "fastapi>=0.115",
    # ``[standard]`` pulls in ``websockets`` + ``httptools`` + ``uvloop``;
    # without ``websockets`` the /ws/chat/* routes fail every upgrade with
    # "No supported WebSocket library detected" under real uvicorn (tests
    # that use Starlette TestClient's in-process WS shim are unaffected,
    # but the Playwright e2e drives a real browser against a real uvicorn
    # subprocess).
    "uvicorn[standard]>=0.32",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brain_api"]

[tool.mypy]
# Issue #2 (partially closed 2026-04-24): the original entry assumed that
# switching pytest to ``--import-mode=importlib`` would let us drop this
# workaround. In practice the duplicate ``prompts/`` directory name
# between ``packages/brain_api/tests/prompts/`` and
# ``packages/brain_mcp/tests/prompts/`` collides REGARDLESS of pytest
# import mode — adding an ``__init__.py`` to brain_api/tests/prompts/
# under importlib mode triggers a pluggy "Plugin already registered"
# error because both conftests then resolve to ``prompts.conftest``.
# Pytest is happily on importlib mode now (root pyproject.toml); the
# mypy workaround stays. Closing this entry would require renaming one
# of the ``prompts/`` directories to fully eliminate the name clash —
# tracked as a follow-up if the collision ever bites elsewhere.
explicit_package_bases = true
# Plan 05 Task 25 — tests/_ws_helpers.py imported by test_ws_chat_*.py
# via its bare module name. With importlib mode the root pytest config
# adds ``packages/brain_api/tests`` to ``pythonpath`` so the bare import
# resolves at runtime; mypy_path here keeps the same import discoverable
# under ``mypy src tests``.
mypy_path = "tests"

[tool.uv.sources]
brain_core = { workspace = true }

[project]
name = "brain_api"
version = "0.1.0"
description = "brain REST + WebSocket backend — FastAPI wrapper around brain_core"
requires-python = ">=3.12"
dependencies = [
    "brain_core",
    # "brain_mcp",  # REMOVED — Plan 05 Task 14 moved RateLimiter to brain_core.
    "fastapi>=0.115",
    # ``[standard]`` pulls in ``websockets`` + ``httptools`` + ``uvloop``;
    # without ``websockets`` the /ws/chat/* routes fail every upgrade with
    # "No supported WebSocket library detected" under real uvicorn (tests
    # that use Starlette TestClient's in-process WS shim are unaffected,
    # but the Playwright e2e drives a real browser against a real uvicorn
    # subprocess).
    "uvicorn[standard]>=0.32",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brain_api"]

[tool.mypy]
# Plan 05 Task 22 — tests/prompts/ intentionally has no __init__.py so pytest
# does not treat it as a duplicate top-level `prompts` package alongside
# brain_mcp/tests/prompts/. explicit_package_bases keeps mypy happy with the
# resulting namespace-style layout (same conftest filename in tests/ and
# tests/prompts/). Tracked for Task 25 sweep — a rootdir-level pytest import
# mode change would let us drop this special case.
explicit_package_bases = true
# Plan 05 Task 25 — tests/_ws_helpers.py imported by test_ws_chat_*.py via
# its bare module name (pytest adds the tests dir to sys.path under
# rootdir discovery). Point mypy at the same dir so the import resolves
# under ``mypy src tests`` without a tests/__init__.py (which would break
# the rationale above).
mypy_path = "tests"

[tool.uv.sources]
brain_core = { workspace = true }

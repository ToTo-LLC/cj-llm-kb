[project]
name = "brain_cli"
version = "0.0.1"
description = "brain CLI — Typer wrapper around brain_core"
requires-python = ">=3.12"
dependencies = [
    "brain_core",
    "typer>=0.13",
    "rich>=13.9",
    "prompt-toolkit>=3.0",
]

[project.scripts]
brain = "brain_cli.app:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brain_cli"]

[tool.uv.sources]
brain_core = { workspace = true }

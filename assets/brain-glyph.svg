<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    brain launcher glyph — placeholder.
    Palette: TomorrowToday orange gradient (#FDEB9E -> #FF6321) from tt-tokens.css.
    Shape: rounded-square background, centered white lowercase "b" wordmark.
    Regenerate rasters with the commands in assets/README.md.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDEB9E"/>
      <stop offset="100%" stop-color="#FF6321"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Lowercase "b" glyph: vertical stem + filled bowl. White, bold. -->
  <!-- Stem -->
  <rect x="312" y="200" width="120" height="624" rx="30" ry="30" fill="#FFFFFF"/>
  <!-- Bowl (outer + inner circle to punch the hole) -->
  <path d="
    M 432 612
    m -236 0
    a 236 236 0 1 0 472 0
    a 236 236 0 1 0 -472 0
    Z
    M 432 612
    m -116 0
    a 116 116 0 1 1 232 0
    a 116 116 0 1 1 -232 0
    Z
  " fill="#FFFFFF" fill-rule="evenodd" transform="translate(180 0)"/>
</svg>

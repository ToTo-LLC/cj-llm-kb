<?xml version="1.0" encoding="UTF-8"?>
<!--
  brain — Cross-domain warning Settings toggle — State 2: after user
  has acknowledged + suppressed (toggle OFF; Config field = true).
  Plan 12 Task 7 (D9 microcopy + interaction-state mocks).

  Light theme; tokens match docs/design/CJ Knowledge LLM v4/styles/brand-skin.css.
  Renders the Settings → Domains panel with surrounding context (per-
  domain rows above + Add domain form below) so the implementer (Task 9)
  can place the new "Cross-domain warning" section without guessing
  surrounding chrome.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1280" height="900" viewBox="0 0 1280 900"
     font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif">

  <defs>
    <style>
      .wm    { font-family: "EB Garamond", Georgia, serif; font-style: italic; font-weight: 500; }
      .mono  { font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace; }
      .micro { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="900" fill="#F3EFE4"/>

  <!-- ============================================================
       Topbar
       ============================================================ -->
  <rect x="0" y="0" width="1280" height="48" fill="#FFFDF6"/>
  <line x1="0" y1="48" x2="1280" y2="48" stroke="rgba(17,17,17,0.20)"/>
  <circle cx="22" cy="24" r="9" fill="none" stroke="#111" stroke-width="1.5"/>
  <circle cx="32" cy="24" r="3.5" fill="#C64B2E"/>
  <text x="50" y="30" font-size="20" fill="#111" class="wm">brain<tspan fill="#C64B2E" font-weight="600">.</tspan></text>
  <text x="118" y="29" font-size="9" fill="#6F6E68" class="mono" letter-spacing="2">V0.1.0</text>
  <rect x="900" y="10" width="190" height="28" rx="3" fill="none" stroke="rgba(17,17,17,0.20)"/>
  <text x="912" y="29" font-size="11" fill="#3A3A38" class="mono">research</text>
  <rect x="1100" y="10" width="120" height="28" rx="3" fill="none" stroke="rgba(17,17,17,0.20)"/>
  <text x="1112" y="29" font-size="11" fill="#3A3A38" class="mono">$0.42 · today</text>
  <circle cx="1248" cy="24" r="9" fill="none" stroke="rgba(17,17,17,0.20)"/>

  <!-- ============================================================
       Left nav rail
       ============================================================ -->
  <rect x="0" y="48" width="220" height="852" fill="#FFFDF6"/>
  <line x1="220" y1="48" x2="220" y2="900" stroke="rgba(17,17,17,0.20)"/>
  <rect x="14" y="68" width="192" height="40" rx="6" fill="#C64B2E"/>
  <text x="110" y="93" font-size="13" fill="#FBF8F0" font-weight="500" text-anchor="middle">+ New chat</text>
  <text x="20" y="138" class="micro" fill="#6F6E68">WORKSPACE</text>
  <g font-size="13" fill="#3A3A38">
    <text x="20" y="166">Chat</text>
    <text x="20" y="194">Inbox</text>
    <text x="20" y="222">Browse</text>
    <text x="20" y="250">Pending</text>
    <text x="20" y="278">Bulk import</text>
    <!-- Active item: Settings -->
    <rect x="6" y="290" width="208" height="28" rx="3" fill="#EDE8DB"/>
    <rect x="6" y="290" width="2" height="28" fill="#C64B2E"/>
    <text x="20" y="308" fill="#111" font-weight="500">Settings</text>
  </g>

  <!-- ============================================================
       Settings: left tab list + main panel
       ============================================================ -->
  <!-- Inner sidebar -->
  <rect x="220" y="48" width="220" height="852" fill="#FBF8F0"/>
  <line x1="440" y1="48" x2="440" y2="900" stroke="rgba(17,17,17,0.09)"/>
  <text x="240" y="84" class="micro" fill="#6F6E68">SETTINGS</text>
  <g font-size="13" fill="#3A3A38">
    <text x="240" y="118">General</text>
    <text x="240" y="146">LLM providers</text>
    <text x="240" y="174">Budget &amp; costs</text>
    <text x="240" y="202">Autonomous mode</text>
    <text x="240" y="230">Integrations</text>
    <!-- Active: Domains -->
    <rect x="232" y="244" width="200" height="28" rx="3" fill="#EDE8DB"/>
    <text x="240" y="262" fill="#111" font-weight="600">Domains</text>
    <text x="240" y="290">BRAIN.md</text>
    <text x="240" y="318">Backups</text>
  </g>

  <!-- ============================================================
       Main panel (Domains)
       ============================================================ -->
  <g transform="translate(472,72)">
    <!-- Page heading -->
    <text x="0" y="0" font-size="22" fill="#111" font-weight="600" letter-spacing="-0.01em">Domains</text>
    <text x="0" y="22" font-size="12" fill="#6F6E68" class="wm" font-style="italic">
      One folder per domain. Privacy-rail keeps a domain out of wildcard reads.
    </text>

    <!-- Section: Domains list -->
    <text x="0" y="60" font-size="13" fill="#111" font-weight="600">Domains</text>
    <text x="0" y="80" font-size="11" fill="#6F6E68">
      Each domain is a top-level folder in your vault. Personal is required and stays privacy-railed.
    </text>

    <!-- Domain list container -->
    <rect x="0" y="96" width="720" height="160" rx="3" fill="#FBF8F0" stroke="rgba(17,17,17,0.09)"/>

    <!-- Row: research -->
    <g transform="translate(0,96)">
      <line x1="0" y1="52" x2="720" y2="52" stroke="rgba(17,17,17,0.09)"/>
      <text x="20" y="32" font-size="13" fill="#3A3A38">▶</text>
      <circle cx="46" cy="26" r="6" fill="#6A8CAA"/>
      <text x="62" y="31" font-size="13" fill="#111" class="mono">research</text>
      <!-- right-side controls -->
      <rect x="448" y="14" width="14" height="14" rx="2" fill="#FFFDF6" stroke="rgba(17,17,17,0.40)"/>
      <text x="468" y="25" font-size="11" fill="#6F6E68">Privacy-railed</text>
      <text x="588" y="25" font-size="11" fill="#3A3A38">✎ Rename</text>
      <text x="664" y="25" font-size="11" fill="#C64B2E">🗑 Delete</text>
    </g>

    <!-- Row: work -->
    <g transform="translate(0,148)">
      <line x1="0" y1="52" x2="720" y2="52" stroke="rgba(17,17,17,0.09)"/>
      <text x="20" y="32" font-size="13" fill="#3A3A38">▶</text>
      <circle cx="46" cy="26" r="6" fill="#6E7F5B"/>
      <text x="62" y="31" font-size="13" fill="#111" class="mono">work</text>
      <rect x="448" y="14" width="14" height="14" rx="2" fill="#FFFDF6" stroke="rgba(17,17,17,0.40)"/>
      <text x="468" y="25" font-size="11" fill="#6F6E68">Privacy-railed</text>
      <text x="588" y="25" font-size="11" fill="#3A3A38">✎ Rename</text>
      <text x="664" y="25" font-size="11" fill="#C64B2E">🗑 Delete</text>
    </g>

    <!-- Row: personal -->
    <g transform="translate(0,200)">
      <text x="20" y="32" font-size="13" fill="#3A3A38">▶</text>
      <circle cx="46" cy="26" r="6" fill="#C64B2E"/>
      <text x="62" y="31" font-size="13" fill="#111" class="mono">personal</text>
      <!-- locked privacy badge -->
      <rect x="146" y="16" width="106" height="20" rx="999" fill="rgba(198,75,46,0.10)" stroke="rgba(198,75,46,0.30)"/>
      <text x="156" y="30" font-size="10" fill="#C64B2E" font-weight="600">🔒 Privacy-railed</text>
      <!-- Disabled checkbox (filled, dim) -->
      <rect x="448" y="14" width="14" height="14" rx="2" fill="#EDE8DB" stroke="rgba(17,17,17,0.20)"/>
      <path d="M451 21 L455 25 L459 17" stroke="#6F6E68" stroke-width="1.5" fill="none"/>
      <text x="468" y="25" font-size="11" fill="#6F6E68">Privacy-railed</text>
      <text x="588" y="25" font-size="11" fill="#3A3A38">✎ Rename</text>
      <!-- No delete button on personal -->
    </g>

    <!-- ============================================================
         NEW SECTION: Cross-domain warning
         (the focus of state 2 — toggle is OFF)
         ============================================================ -->
    <g transform="translate(0,288)">
      <text x="0" y="0" font-size="13" fill="#111" font-weight="600">Cross-domain warning</text>

      <!-- Toggle row -->
      <rect x="0" y="20" width="720" height="120" rx="3" fill="#FBF8F0" stroke="rgba(17,17,17,0.20)"/>

      <!-- Switch (OFF state — knob left, track grey) -->
      <g transform="translate(20,40)">
        <rect x="0" y="0" width="34" height="18" rx="999" fill="#EDE8DB" stroke="rgba(17,17,17,0.20)"/>
        <circle cx="9" cy="9" r="7" fill="#FFFDF6" stroke="rgba(17,17,17,0.20)"/>
      </g>
      <text x="66" y="54" font-size="13" fill="#111" font-weight="500">Show cross-domain warning</text>

      <!-- Helper text (OFF copy) -->
      <text x="66" y="80" font-size="12" fill="#6F6E68">
        <tspan>The confirmation is off. Mixed-scope chats including private domains will</tspan>
      </text>
      <text x="66" y="96" font-size="12" fill="#6F6E68">
        <tspan>start without a prompt. Turn this back on if you want the check back.</tspan>
      </text>

      <!-- Inline trace note (small) -->
      <g transform="translate(66,108)">
        <text x="0" y="0" class="micro" fill="#6F6E68" font-size="9">
          ACKNOWLEDGED · STORED IN CONFIG.JSON
        </text>
      </g>
    </g>

    <!-- ============================================================
         Section: Add domain (kept for context — shows where the
         new toggle slots in relative to existing affordances)
         ============================================================ -->
    <g transform="translate(0,460)">
      <text x="0" y="0" font-size="13" fill="#111" font-weight="600">Add domain</text>
      <rect x="0" y="20" width="720" height="56" rx="3" fill="#FBF8F0" stroke="rgba(17,17,17,0.09)"/>
      <rect x="20" y="38" width="220" height="22" rx="3" fill="#FFFDF6" stroke="rgba(17,17,17,0.20)"/>
      <text x="28" y="53" font-size="12" fill="#6F6E68">slug (e.g. journal)</text>
      <rect x="252" y="38" width="80" height="22" rx="3" fill="#FFFDF6" stroke="rgba(17,17,17,0.20)"/>
      <text x="292" y="53" font-size="11" fill="#6F6E68" text-anchor="middle">color ▾</text>
      <rect x="640" y="36" width="60" height="26" rx="3" fill="#C64B2E"/>
      <text x="670" y="53" font-size="12" fill="#FBF8F0" font-weight="500" text-anchor="middle">Add</text>
    </g>
  </g>

  <!-- ============================================================
       Annotation strip
       ============================================================ -->
  <g transform="translate(28,856)" font-size="11" fill="#FBF8F0">
    <rect x="-12" y="-18" width="1224" height="34" rx="3" fill="#1C1C1B" opacity="0.92"/>
    <text x="0" y="3" class="mono" opacity="0.75">STATE 2 / SETTINGS → DOMAINS · TOGGLE OFF</text>
    <text x="296" y="3" opacity="0.85">
      Config.cross_domain_warning_acknowledged = true · modal will not fire on next D7 trigger
    </text>
    <text x="950" y="3" opacity="0.65">light theme · 1280×900</text>
  </g>
</svg>
